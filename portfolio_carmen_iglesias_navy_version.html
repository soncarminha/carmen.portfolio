<!DOCTYPE html> 
<html lang="es"> 
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carmen Iglesias — Copywriter</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #F2F4F3;
    --ink: #0B1F3B;
    --muted: #5E503F;
    --accent: #49111C;
    --line: #A9927D;
    --white: #F2F4F3;
    --taupe: #A9927D;
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.7;
  }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1.25rem 3rem;
    background: #0B1F3B;
    border-bottom: 1px solid #162a4a;
  }

  .nav-logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
    letter-spacing: 0.02em;
    color: #F2F4F3;
    text-decoration: none;
  }

  .nav-links { display: flex; gap: 2rem; list-style: none; }

  .nav-links a {
    font-size: 0.85rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: #A9927D;
    text-decoration: none;
    transition: color 0.2s;
  }

  .nav-links a:hover { color: #F2F4F3; }

  .hero {
    min-height: 100vh;
    display: flex;
    align-items: flex-end;
    padding: 8rem 3rem 5rem;
    position: relative;
    overflow: hidden;
    background:#0B1F3B;
  }

  .hero-bg-text {
    position: absolute;
    top: 50%;
    left: -2rem;
    transform: translateY(-50%);
    font-family: 'Playfair Display', serif;
    font-size: clamp(8rem, 20vw, 18rem);
    font-weight: 700;
    color: transparent;
    -webkit-text-stroke: 1px var(--line);
    white-space: nowrap;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    animation: fadeIn 1.2s 0.2s forwards;
  }

  .hero-content {
    position: relative;
    z-index: 2;
    max-width: 700px;
    opacity: 0;
    transform: translateY(30px);
    animation: slideUp 0.9s 0.4s forwards;
  }

  .hero h1 { color: #F2F4F3; }

  .hero h1 em { color: var(--accent); }

  .hero-bio { color: #A9927D; }

  .btn-primary { background: var(--accent); color: var(--cream); }

  .btn-secondary { border: 1px solid #A9927D; color: #A9927D; }

  .skills-section { background: var(--white); }

  .skill-card { background: #0B1F3B; border-color: #0B1F3B; }

  .work { background: #0B1F3B; }

  .contact { background: #0B1F3B; }

  footer { background: #0B1F3B; border-color: #162a4a; }

</style>
</head>
<body>

<!-- TODO: resto del HTML permanece exactamente igual que el original -->

</body>
</html>
